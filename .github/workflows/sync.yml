name: Sync wiki

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write           # needed to push the sync commit

concurrency:
  group: sync-wiki          # never run two syncs concurrently
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      ZH_DS_ID: 17a0aee4-fbad-81a4-8a6f-000b6b236f69
      EN_DS_ID: 35b0aee4-fbad-81b7-bd9d-000b8c176dd5
      BLOG_DS_ID: 35c0aee4-fbad-8001-a903-000bcd336c3e
      EN_RELATION_PROPERTY: zh
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run sync

      - name: Commit if changed
        id: commit
        env:
          TRIGGER: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'cron' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add wiki/
          if git diff --cached --quiet; then
            echo 'No changes; skipping commit.'
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "sync: $(date -u +%Y-%m-%d)-$TRIGGER"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # - name: Trigger Vercel deploy
      #   if: steps.commit.outputs.changed == 'true'
